apiVersion: apps/v1
kind: Deployment

metadata:
  name: jenkins-proj-101-backend
spec:
  replicas: 4
  selector:
    matchLabels:
      app: jenkins-proj-101-backend
  template:
    metadata:
      labels:
        app: jenkins-proj-101-backend
    spec:
      initContainers:
        - name: init-service
          image: busybox
          command: ['sh', '-c' , 'echo waiting... && sleep 15']

      containers:
        - name: jenkins-proj-101-backend
          image: sohan0077/jenbackend:e6400f0
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m" ## REQUIRED FOR HPA
            limits:
              cpu: "200m"

---

apiVersion: v1
kind: Service
metadata:
  name: jenkins-proj-101-backend
spec:
  selector:
    app: jenkins-proj-101-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: NodePort

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hqa-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jenkins-proj-101-backend
  
  minReplicas: 4
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50